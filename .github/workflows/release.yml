name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Validate tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$tag" != "$version" ]; then
            echo "Tag version ($tag) does not match package.json version ($version)." >&2
            exit 1
          fi
          if [[ "$tag" == *-* ]]; then
            echo "Pre-release tags are not supported by this automation. Use a stable semver tag." >&2
            exit 1
          fi

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit that is already on origin/main." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package
        run: pnpm check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists."
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes
