name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Validate release tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$tag" != "$version" ]; then
            echo "Tag version ($tag) does not match package.json version ($version)." >&2
            exit 1
          fi
          if [[ "$tag" == *-* ]]; then
            echo "Pre-release tags are not supported by this automation. Use a stable semver tag." >&2
            exit 1
          fi

      - name: Ensure release tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit that is already on origin/main." >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package
        run: pnpm check

      - name: Publish to npm
        run: npm publish --access public
